<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesiInsta - Downloader</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
  min-height:100vh;
  color:white;
}

.topbar{
  background:#4338ca;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}

.topbar span{
  font-size:18px;
}

.hero{
  text-align:center;
  padding:40px 20px 20px;
}

.hero h1{
  font-size:30px;
}

.hero p{
  margin-top:10px;
  opacity:0.9;
  font-size:15px;
}

.card{
  max-width:500px;
  margin:20px auto;
  padding:20px;
  border-radius:25px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
}

.input-box{
  display:flex;
  background:white;
  border-radius:14px;
  overflow:hidden;
}

.input-box input{
  flex:1;
  border:none;
  padding:14px;
  font-size:14px;
  outline:none;
}

.input-box button{
  background:#f3e8ff;
  border:none;
  padding:0 15px;
  font-weight:600;
  cursor:pointer;
}

.download-btn{
  margin-top:18px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  color:white;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  box-shadow:0 8px 20px rgba(34,197,94,0.4);
  transition:all 0.25s ease;
}

.download-btn.loading{
  background:linear-gradient(90deg,#4f46e5,#9333ea);
}

.loader{
  margin-top:15px;
  text-align:center;
}

.spinner{
  width:28px;
  height:28px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid white;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  margin:auto;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.result{
  margin-top:20px;
}

.media-card{
  background:white;
  border-radius:20px;
  padding:15px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.media-wrapper{
  position:relative;
  border-radius:18px;
  overflow:hidden;
}

.thumb-img{
  width:100%;
  border-radius:18px;
}

.media-wrapper video{
  width:100%;
  display:none;
  border-radius:18px;
}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.65);
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:white;
  cursor:pointer;
}

.pro-download-btn{
  display:block;
  margin-top:15px;
  padding:14px;
  border-radius:30px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
  color:white;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9);
}

.error{
  margin-top:15px;
  color:#ffe4e6;
  text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
  <span>Desi-Insta</span>
</div>

<div class="hero">
  <h1>Instagram Video Downloader</h1>
  <p>Download Instagram, Reels, Photos, Stories instantly</p>
</div>

<div class="card">

  <div class="input-box">
    <input type="text" id="url" placeholder="Paste URL here">
    <button onclick="paste()">Paste</button>
  </div>

  <button class="download-btn" id="btn" onclick="download()">
    <span class="btn-content">
      <span>⬇</span>
      <span class="text">Download</span>
    </span>
  </button>

  <div class="loader" id="loader"></div>
  <div class="error" id="error"></div>
  <div class="result" id="result"></div>

</div>

<script>

function paste(){
  navigator.clipboard.readText()
  .then(text=>{
    document.getElementById("url").value=text;
  });
}

async function download(){

  const btn=document.getElementById("btn");
  const btnText=btn.querySelector(".text");
  const url=document.getElementById("url").value.trim();
  const loader=document.getElementById("loader");
  const error=document.getElementById("error");
  const result=document.getElementById("result");

  error.innerText="";
  result.innerHTML="";
  loader.innerHTML='<div class="spinner"></div>';

  btn.disabled=true;
  btn.classList.add("loading");
  btnText.innerText="Processing...";

  try{

    const res=await fetch(`https://universal-downloaders.vercel.app/api/meta/download?url=${encodeURIComponent(url)}`);
    const json=await res.json();

    loader.innerHTML="";
    btn.disabled=false;
    btn.classList.remove("loading");
    btnText.innerText="Download";

    if(json.success){

      const items=json.data?.data || [];

      items.forEach(item=>{

        const card=document.createElement("div");
        card.className="media-card";

        const mediaUrl=item.url;
        const thumb=item.thumbnail || "";

        if(mediaUrl.includes(".mp4")){

          card.innerHTML=`
            <div class="media-wrapper">
              ${thumb ? `<img src="${thumb}" class="thumb-img">` : ""}
              <div class="play-btn">▶</div>
              <video src="${mediaUrl}" controls></video>
            </div>

            <a href="${mediaUrl}" target="_blank" class="pro-download-btn">
              ⬇ Download Video
            </a>
          `;

        }else{

          card.innerHTML=`
            <img src="${mediaUrl}" class="thumb-img">

            <a href="${mediaUrl}" target="_blank" class="pro-download-btn">
              ⬇ Download Image
            </a>
          `;
        }

        result.appendChild(card);

      });

      document.querySelectorAll(".play-btn").forEach(btn=>{
        btn.addEventListener("click",function(){
          const wrapper=this.parentElement;
          const img=wrapper.querySelector("img");
          const video=wrapper.querySelector("video");

          if(img) img.style.display="none";
          this.style.display="none";

          video.style.display="block";
          video.play();
        });
      });

    }else{
      error.innerText="No media found";
    }

  }catch(e){

    loader.innerHTML="";
    btn.disabled=false;
    btn.classList.remove("loading");
    btnText.innerText="Download";

    error.innerText="API error / blocked";
  }

}

</script>

</body>
</html>
